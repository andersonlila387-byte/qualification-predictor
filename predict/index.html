<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qualification Predictor</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
        <h2 class="text-2xl font-bold mb-6 text-gray-800 text-center">Check Qualification</h2>
        
        <form id="predictionForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Experience (Years)</label>
                <input type="number" id="exp" name="experience" required
                    class="mt-1 block w-full border border-gray-300 rounded-md p-2 shadow-sm focus:ring-blue-500 focus:border-blue-500">
            </div>
            <button type="submit" 
                class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 transition duration-200">
                Predict Now
            </button>
        </form>

        <div id="result" class="mt-6 p-4 hidden rounded-md text-center font-semibold"></div>
    </div>

    <script>
        document.getElementById('predictionForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const resultDiv = document.getElementById('result');
            const formData = new FormData(e.target);

            resultDiv.classList.remove('hidden', 'bg-green-100', 'bg-red-100');
            resultDiv.innerText = "Processing...";

            try {
                const response = await fetch('backend.php', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();

                resultDiv.classList.add('block', data.status === 'success' ? 'bg-green-100' : 'bg-red-100');
                resultDiv.innerText = data.prediction || data.error;
            } catch (error) {
                resultDiv.innerText = "Error connecting to server.";
            }
        });
    </script>
</body>
</html>
